<script type="text/babel">
// ═══════════════════════════════════════════════════════════════
// CONFIG — paste your Cloudflare Worker URL after deploying

const MOCHI_COACH_URL = ''; // e.g. 'https://mochi-coach.YOUR_SUBDOMAIN.workers.dev'

// ═══════════════════════════════════════════════════════════════

const HABIT_HUES = {
  sage: '#8FA77F', sky: '#8FB8CC', rose: '#D49C97', ochre: '#D9B26B', lavender: '#B8A4C4',
};
function genHistory(n, density, missDays = []) {
  const out = [];
  for (let i = 0; i < n; i++) {
    if (missDays.includes(i)) { out.push(false); continue; }
    out.push(((i * 73 + 11) % 100) / 100 < density);
  }
  return out;
}
const INITIAL_HABITS = [
  { id:'pages', name:'Morning pages', identity:'a writer', cue:'After the kettle clicks', response:'Write three pages, longhand', reward:'A clearer head', minimum:'One sentence', time:'07:00', hue:HABIT_HUES.sage, accessory:'quill', theme:'pages', streak:12, longest:18, history:genHistory(30,0.85,[5]), creatureName:'Sumi', done:false, withered:false, frequency:'daily' },
  { id:'walk', name:'Walk after lunch', identity:'someone who moves gently', cue:'After I close my laptop at lunch', response:'Walk for 12 minutes', reward:'A second wind', minimum:'Around the block', time:'13:30', hue:HABIT_HUES.sky, accessory:'boots', theme:'walk', streak:5, longest:9, history:genHistory(30,0.7,[11,14,20,21]), creatureName:'Aoi', done:false, withered:false, frequency:'daily' },
  { id:'read', name:'Read 10 pages', identity:'a reader', cue:'After I get into bed', response:'Read ten pages', reward:'Soft sleep', minimum:'One paragraph', time:'22:30', hue:HABIT_HUES.rose, accessory:'specs', theme:'read', streak:26, longest:26, history:genHistory(30,0.95,[]), creatureName:'Kaze', done:true, withered:false, frequency:'daily' },
  { id:'stretch', name:'Stretch', identity:'someone kind to my body', cue:'After I brush my teeth', response:'Five minutes of stretching', reward:'Less stiffness', minimum:'One stretch', time:'07:30', hue:HABIT_HUES.ochre, accessory:'leaf', theme:'stretch', streak:1, longest:7, history:genHistory(30,0.5,[25,26,27]), creatureName:'Hana', done:false, withered:false, frequency:'daily' },
  { id:'sleep', name:'Lights out by 11', identity:'well-rested', cue:'When the clock turns 22:45', response:'Close everything and sleep', reward:'Mornings I want to wake into', minimum:'In bed by 11:30', time:'23:00', hue:HABIT_HUES.lavender, accessory:'cap', theme:'sleep', streak:0, longest:11, history:genHistory(30,0.4,[29,28,27,26,25,24,23,0,1,2]), creatureName:'Yume', done:false, withered:true, frequency:'weekly' },
];

// ── Habit tips & book suggestions (curated by theme) ────────────
const HABIT_TIPS = {
  read:      { book:'Atomic Habits', author:'James Clear',       tip:'Read during a consistent anchor — right after breakfast or just before sleep.' },
  pages:     { book:'Bird by Bird', author:'Anne Lamott',        tip:'Write the shitty first draft. Showing up matters more than perfection.' },
  walk:      { book:'In Praise of Walking', author:'Shane O\'Mara', tip:'Even 12 minutes shifts your nervous system into a calmer state.' },
  sleep:     { book:'Why We Sleep', author:'Matthew Walker',     tip:'Regularity beats duration. A consistent bedtime trains your circadian clock.' },

  tea:       { book:'The Miracle Morning', author:'Hal Elrod',   tip:'A ritual drink signals your brain: "this time is different, this time is mine."' },
  music:     { book:'The Art of Practice', author:'Robert Duke', tip:'Short daily sessions beat long weekly ones. 15 minutes every day compounds fast.' },
  gratitude: { book:'Thanks!', author:'Robert Emmons',           tip:'Three specific things, not generic ones. Be precise, not vague.' },
  ambient:   { book:'Atomic Habits', author:'James Clear',       tip:'Every action is a vote for the kind of person you want to become.' },
};

// ── Japanese name stylisation ────────────────────────────────────
const NAME_KANJI = ['彩','颯','澄','輝','空','夢','光','風','波','花','星','葉'];
function getNameKanji(name) {
  if (!name) return '';
  const idx = name.split('').reduce((s,c)=>s+c.charCodeAt(0),0) % NAME_KANJI.length;
  return NAME_KANJI[idx];
}

// ── Mock friends data (friend-only leaderboard) ──────────────────
const MOCK_FRIENDS = [
  { name:'Yuki',   streak:34, done:4, total:5, hue:HABIT_HUES.sky,      stage:'ascending' },
  { name:'Ren',    streak:21, done:3, total:4, hue:HABIT_HUES.rose,     stage:'grown'     },
  { name:'Hana',   streak:12, done:2, total:3, hue:HABIT_HUES.ochre,    stage:'toddler'   },
  { name:'Sota',   streak: 8, done:1, total:3, hue:HABIT_HUES.lavender, stage:'hatchling' },
];
const COACH_MESSAGES = [
  { who:'coach', text:'Good morning. The sea is calm today.' },
  { who:'coach', text:"Sumi has been waiting at the dock — three pages, when you're ready." },
  { who:'me', text:"I'm tired. Can it wait?" },
  { who:'coach', text:"Of course. But Yume drifted last night — three days now. Shall we plant a smaller version? One paragraph instead of three pages." },
  { who:'me', text:'Okay. One paragraph.' },
  { who:'coach', text:'A grain of rice still feeds the bird. Begin when you can.' },
];
const COACH_SUGGESTIONS = ["How are my mochi doing?","I keep missing this habit","Help me make it smaller","Which habit needs care?"];

// ── Smart template fallback (used when MOCHI_COACH_URL is not set) ──
function templateReply(text, habits) {
  const t = text.toLowerCase();
  const drifting = habits.filter(h => h.withered);
  const thriving = habits.filter(h => h.streak >= 7 && !h.withered);
  const best = habits.length ? habits.reduce((a,b) => a.streak > b.streak ? a : b) : null;
  const newest = habits.length ? [...habits].sort((a,b) => a.streak - b.streak)[0] : null;

  // Detect intent and pick a contextual response
  if (t.includes('how are') || t.includes('doing') || t.includes('mochi')) {
    if (!habits.length) return 'The garden is quiet and waiting. Plant your first habit, and a small soul will begin to stir.';
    if (drifting.length && thriving.length)
      return `${thriving[0].creatureName} is steady at ${thriving[0].streak} days — a quiet glow. ${drifting[0].creatureName} has drifted, but still breathes. One small act tonight would be enough.`;
    if (drifting.length)
      return `${drifting[0].creatureName} has been quiet. Even the smallest version of "${drifting[0].minimum.toLowerCase()}" would bring warmth back.`;
    if (best)
      return `${best.creatureName} is glowing at ${best.streak} days. The others are moving gently. The sea feels calm.`;
  }

  if (t.includes('miss') || t.includes('skip') || t.includes('fail') || t.includes('broke')) {
    if (drifting.length)
      return `${drifting[0].creatureName} understands. A missed day is not a lost cause — it is a tide that will return. Try just "${drifting[0].minimum.toLowerCase()}" tonight.`;
    return 'Missing a day is how the habit learns your life. Begin again tomorrow, smaller if needed. The streak is not the point — the return is.';
  }

  if (t.includes('smaller') || t.includes('easier') || t.includes('hard') || t.includes('difficult')) {
    const h = drifting[0] || newest;
    if (h) return `For ${h.creatureName}, the smallest door is: "${h.minimum.toLowerCase()}". Walk through just that. Everything else is extra.`;
    return 'Find the version so small it feels almost silly. That is the one to do on hard days. It keeps the thread unbroken.';
  }

  if (t.includes('which') || t.includes('care') || t.includes('focus') || t.includes('attention')) {
    if (drifting.length)
      return `${drifting[0].creatureName} needs the most tending right now — ${drifting[0].streak === 0 ? 'the streak has rested' : `${drifting[0].streak} days quiet`}. One small step would be enough.`;
    if (newest && newest.streak < 3)
      return `${newest.creatureName} is still young — ${newest.streak} days. The first three are the most tender. Hold it gently.`;
    return 'All your mochi are moving quietly. Rest tonight, and return tomorrow with one small act.';
  }

  if (t.includes('stuck') || t.includes('motivat') || t.includes('start')) {
    if (best) return `${best.creatureName} has shown you ${best.streak} days of proof. You already know how. Begin with just one breath of it.`;
    return 'Beginning is the only hard part. Place just one step — the smallest one. The rest will follow in its own time.';
  }

  if (t.includes('good') || t.includes('great') || t.includes('doing well') || t.includes('proud')) {
    if (best) return `${best.streak} days with ${best.creatureName}. That is real. The sea remembers every morning you showed up.`;
    return 'Each kept day adds a stone to a quiet wall. You may not see it yet, but it is rising.';
  }

  // Default gentle response referencing their actual data
  if (best && best.streak > 0)
    return `${best.creatureName} is still here, ${best.streak} days strong. What would you like to tend today?`;
  return 'I am here for your habits — your streaks, your drifting mochi, the small hard days. What would you like to tend?';
}

// ═══════════════════════════════════════════════════════════════
// HOOKS
// ═══════════════════════════════════════════════════════════════
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null ? keyOrEdits : { [keyOrEdits]: val };
    setValues(prev => ({ ...prev, ...edits }));
  }, []);
  return [values, setTweak];
}

// ═══════════════════════════════════════════════════════════════
// MOCHI RENDERER
// ═══════════════════════════════════════════════════════════════
const STAGES = ['seed','hatchling','toddler','grown','ascending','transformed'];
function stageFromStreak(streak) {
  if (streak < 3)  return 'seed';
  if (streak < 7)  return 'hatchling';
  if (streak < 14) return 'toddler';

        {stage!=='seed'&&<HeldItem theme={theme} cx={cx} cy={cy} r={r} hue={accentColor} withered={withered}/>}

    </svg>

  {keys:['walk','run','jog','step','move','hike'],theme:'walk',accessory:'boots'},
  {keys:['sleep','bed','rest','wake','lights out','nap'],theme:'sleep',accessory:'cap'},

function inferTheme(habit) {
  const text=((habit.name||'')+' '+(habit.identity||'')+' '+(habit.response||'')).toLowerCase();

          {habit.withered&&<Chip color="rgba(212,156,151,0.18)" textColor="var(--rose-400)">drifting</Chip>}
          {habit.done&&<Chip color="rgba(143,167,127,0.2)" textColor="var(--sage-400)" icon={<span style={{fontSize:9}}>✓</span>}>ascended</Chip>}

function CoachWhisper({ habits }) {
  if (!habits.length) return null;
  const wilting=habits.find(h=>h.withered);
  const longest=habits.reduce((a,b)=>a.streak>b.streak?a:b,habits[0]);
  const message=wilting?`${wilting.creatureName} has drifted. A smaller version — perhaps just "${wilting.minimum.toLowerCase()}" tonight — would bring it close again.`:`${longest.creatureName} is glowing. Day ${longest.streak} is when mochi begin to rise.`;
  return (
    <Card style={{display:'flex',gap:12,alignItems:'flex-start',background:'linear-gradient(135deg,rgba(220,234,241,0.5),rgba(247,242,229,0.7))',border:'0.5px solid rgba(143,167,127,0.18)'}} padding={16}>
      <div style={{width:36,height:36,borderRadius:999,flexShrink:0,background:'var(--card)',border:'0.5px solid var(--line-strong)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--sage-400)'}}>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" opacity="0.85"><path d="M22 4c-3 1-6 2-10 5s-6 6-8 11c1-3 3-6 6-8s7-3 9-3-3 3-5 5l3 3c2-2 4-5 5-13z"/></svg>
      </div>
      <div style={{flex:1}}>
        <div style={{fontSize:11,fontWeight:600,letterSpacing:1,textTransform:'uppercase',color:'var(--ink-3)',marginBottom:2}}>Mochi whispers</div>
        <div style={{fontFamily:'var(--font-display)',fontSize:15,fontStyle:'italic',color:'var(--ink-2)',lineHeight:1.4,fontWeight:300}}>{message}</div>
      </div>
    </Card>
  );
}

              <div style={{width:32,height:32,borderRadius:999,background:f.hue+'33',border:`1.5px solid ${f.hue}`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>

        </SoftSection>
      </div>
    </ScreenContainer>
  );
}

// COACH SCREEN — powered via Cloudflare Worker proxy
// ═══════════════════════════════════════════════════════════════
function CoachScreen({ habits, mood='day' }) {
  const [messages, setMessages] = React.useState(COACH_MESSAGES);
  const [draft, setDraft] = React.useState('');
  const [loading, setLoading] = React.useState(false);
  const scrollerRef = React.useRef(null);

  React.useEffect(() => {
    if (scrollerRef.current) scrollerRef.current.scrollTop = scrollerRef.current.scrollHeight;
  }, [messages, loading]);

  const send = async (text) => {
    if (!text.trim() || loading) return;
    const newMessages = [...messages, { who:'me', text }];
    setMessages(newMessages);
    setDraft('');
    setLoading(true);

    const habitSummary = habits.length
      ? habits.map(h=>`${h.creatureName} (${h.name}): ${h.streak}-day streak${h.withered?', drifting':''}${h.done?', done today':''}`).join('\n')
      : 'No habits planted yet.';

    const conversationHistory = newMessages.map(m=>({
      role: m.who==='me' ? 'user' : 'assistant',
      content: m.text
    }));

    try {
      let reply;
      if (MOCHI_COACH_URL) {
        const res = await fetch(MOCHI_COACH_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: conversationHistory, habitSummary })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'upstream error');
        reply = data.reply;
      } else {
        // Graceful fallback — smart template responses until proxy is deployed
        await new Promise(r => setTimeout(r, 400 + Math.random() * 600));
        reply = templateReply(text, habits);
      }
      setMessages(m => [...m, { who:'coach', text:reply }]);
    } catch {
      setMessages(m => [...m, { who:'coach', text:'The tide went quiet. Speak again in a moment.' }]);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div style={{height:'100%',display:'flex',flexDirection:'column',background:'var(--bg)'}}>
      {/* Header */}
      <div style={{position:'relative',flexShrink:0}}>
        <Sky mood={mood} height={170}><Hills mood={mood}/></Sky>
        <div style={{position:'absolute',top:56,left:22,right:22}}>
          <div style={{fontSize:11,fontWeight:600,letterSpacing:1.4,textTransform:'uppercase',color:mood==='night'?'rgba(248,244,230,0.7)':'var(--ink-3)'}}>Your coach</div>
          <H1 style={{marginTop:4,color:mood==='night'?'#F8F4E6':'var(--ink)'}}>Mochi</H1>
        </div>
        <div style={{position:'absolute',right:14,bottom:0}}>
          <Mochi fixedStage="ascending" hue={HABIT_HUES.ochre} accessory="star" size={96}/>
        </div>
        {!MOCHI_COACH_URL && (
          <div style={{position:'absolute',bottom:8,left:16,fontSize:10,color:mood==='night'?'rgba(248,244,230,0.5)':'var(--ink-4)',fontStyle:'italic',letterSpacing:0.2}}>
            Template mode · deploy worker for Claude AI
          </div>
        )}
      </div>
      {/* Messages */}
      <div ref={scrollerRef} className="scroll-hide" style={{flex:1,overflow:'auto',padding:'12px 16px 12px'}}>
        {messages.map((m,i)=>(
          <div key={i} style={{display:'flex',justifyContent:m.who==='me'?'flex-end':'flex-start',marginBottom:10}}>
            <div style={{maxWidth:'78%',padding:'12px 16px',borderRadius:22,background:m.who==='me'?'var(--ink)':'var(--card)',color:m.who==='me'?'var(--cream-50)':'var(--ink)',fontFamily:m.who==='me'?'var(--font-ui)':'var(--font-display)',fontStyle:m.who==='me'?'normal':'italic',fontSize:m.who==='me'?15:16,fontWeight:m.who==='me'?400:300,lineHeight:1.4,letterSpacing:-0.1,boxShadow:m.who==='me'?'none':'var(--shadow-soft)',borderBottomRightRadius:m.who==='me'?6:22,borderBottomLeftRadius:m.who==='me'?22:6}}>{m.text}</div>
          </div>
        ))}
        {loading && (
          <div style={{display:'flex',justifyContent:'flex-start',marginBottom:10}}>
            <div style={{padding:'14px 18px',borderRadius:22,borderBottomLeftRadius:6,background:'var(--card)',boxShadow:'var(--shadow-soft)',display:'flex',gap:5,alignItems:'center'}}>
              {[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:'50%',background:'var(--ink-3)',animation:`typing 1.2s ease-in-out infinite ${i*0.2}s`}}/>)}
            </div>
          </div>
        )}
      </div>
      {/* Quick suggestions */}
      <div style={{padding:'0 16px 8px',display:'flex',gap:6,overflowX:'auto'}} className="scroll-hide">
        {COACH_SUGGESTIONS.map((s,i)=>(
          <button key={i} onClick={()=>send(s)} disabled={loading} style={{border:'0.5px solid var(--line-strong)',background:'var(--card-2)',color:'var(--ink-2)',padding:'8px 14px',borderRadius:999,fontSize:13,fontFamily:'var(--font-ui)',whiteSpace:'nowrap',cursor:loading?'default':'pointer',flexShrink:0,opacity:loading?0.5:1}}>{s}</button>
        ))}
      </div>
      {/* Input */}
      <div style={{padding:'8px 16px 100px',display:'flex',gap:8}}>
        <div style={{flex:1,display:'flex',alignItems:'center',gap:8,background:'var(--card)',borderRadius:999,padding:'4px 6px 4px 18px',boxShadow:'var(--shadow-soft)',border:'0.5px solid var(--line-strong)'}}>
          <input value={draft} onChange={e=>setDraft(e.target.value)} onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&send(draft)} placeholder="Speak to Mochi…" disabled={loading} style={{flex:1,border:0,background:'transparent',outline:'none',fontFamily:'var(--font-ui)',fontSize:15,color:'var(--ink)',padding:'12px 0'}}/>
          <button onClick={()=>send(draft)} disabled={!draft.trim()||loading} style={{width:40,height:40,borderRadius:999,border:0,background:draft.trim()&&!loading?'var(--accent)':'var(--cream-200)',color:'white',cursor:draft.trim()&&!loading?'pointer':'default',display:'flex',alignItems:'center',justifyContent:'center',transition:'all 0.2s'}}>{ICON.send()}</button>
        </div>
      </div>
    </div>
  );
}

// ADD HABIT SCREEN
// ═══════════════════════════════════════════════════════════════
function AddHabitScreen({ onClose, onCreate, habitCount=0 }) {
  const [step, setStep] = React.useState(0);
  const [data, setData] = React.useState({ identity:'', name:'', cue:'', minimum:'', hue:HABIT_HUES.sage, creatureName:'', frequency:'daily', days:['Mo','Tu','We','Th','Fr','Sa','Su'], world:'', worldName:'' });

  // 5-habit limit guard
  if (habitCount >= 5) return (
    <div style={{position:'absolute',inset:0,zIndex:60,background:'var(--bg)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:32,animation:'fadeIn 0.3s'}}>
      <Mochi fixedStage="ascending" hue={HABIT_HUES.ochre} size={100}/>
      <div style={{fontFamily:'var(--font-display)',fontSize:26,fontWeight:400,color:'var(--ink)',letterSpacing:-0.4,marginTop:20,marginBottom:8,textAlign:'center'}}>The island is full.</div>
      <div style={{fontFamily:'var(--font-display)',fontStyle:'italic',fontSize:16,color:'var(--ink-3)',fontWeight:300,lineHeight:1.5,textAlign:'center',marginBottom:32,maxWidth:260}}>Up to 5 mochi can live here at once. Retire or tend an existing one before planting new.</div>
      <button onClick={onClose} style={{width:'100%',maxWidth:280,height:52,borderRadius:999,border:0,background:'var(--ink)',color:'var(--cream-50)',fontFamily:'var(--font-ui)',fontSize:16,fontWeight:500,cursor:'pointer'}}>Back to overview</button>
    </div>
  );

  const ALL_DAYS = ['Mo','Tu','We','Th','Fr','Sa','Su'];
  const WORLD_OPTIONS = [
    { id:'spirited', label:'Spirited Away', emoji:'🌊', desc:'The bathhouse sea' },
    { id:'howl',     label:"Howl's Castle",  emoji:'🏰', desc:'Rolling hills, smoke' },
    { id:'totoro',   label:'My Totoro',      emoji:'🌳', desc:'Countryside forest' },
    { id:'heron',    label:'The Heron',      emoji:'🪶', desc:'The tower between worlds' },
    { id:'kiki',     label:"Kiki's Sky",     emoji:'🧹', desc:'Coastal town, open sky' },
    { id:'custom',   label:'Your own world', emoji:'✨', desc:'Name it below' },
  ];

  const steps=[
    {key:'intro',   title:"What's the tiny practice?",   sub:'Start small. Boring is fine.'},
    {key:'days',    title:'Which days?',                  sub:'Choose the days this practice belongs to.'},
    {key:'world',   title:"Where does your mochi live?",  sub:'Pick the world where it drifts while you sleep.'},
    {key:'identity',title:'Who are you becoming?',        sub:'Habits are votes for the kind of person you want to be.',   prompt:'I want to become',  placeholder:'a writer / someone who moves gently'},
    {key:'cue',     title:'When?',                        sub:'Anchor it to something that already happens.',              prompt:'After',              placeholder:'the kettle clicks / I close my laptop'},
    {key:'minimum', title:'And on the hard days?',        sub:"The two-minute version, for when you almost can't.",        prompt:'At minimum I will',  placeholder:'write one sentence / walk to the corner'},
    {key:'creature',title:'Name your mochi',              sub:'A small soul will hatch when you keep this for three days.'},
  ];
  const cur=steps[step];

  const canNext = (() => {
    if (cur.key==='intro') return data.name.length > 0;
    if (cur.key==='days') return data.days.length > 0;
    if (cur.key==='world') return data.world.length > 0 && (data.world !== 'custom' || data.worldName.length > 0);
    if (cur.key==='creature') return data.creatureName.length > 0;
    return (data[cur.key]||'').length > 0;
  })();

  const next=()=>{
    if(step<steps.length-1){setStep(step+1);}
    else{
      const theme=inferTheme({name:data.name,identity:data.identity,response:data.name});
      onCreate({
        ...data,
        id:'new-'+Date.now(),
        response:data.name,
        reward:'becoming '+data.identity,
        time:'—',
        streak:0,
        longest:0,
        history:Array(30).fill(false),
        done:false,
        withered:false,
        theme:theme.theme,
        accessory:data.accessory||theme.accessory,
        days:data.days,
        world:data.world,
        worldName:data.worldName||data.world,
      });
    }
  };

  const toggleDay = (day) => {
    setData(prev => {
      const inArr = prev.days.includes(day);
      return {...prev, days: inArr ? prev.days.filter(d=>d!==day) : [...prev.days, day]};

// CHECK-IN OVERLAY
// ═══════════════════════════════════════════════════════════════
function CheckInOverlay({ habit, onClose }) {
  const [phase, setPhase] = React.useState(0);
  React.useEffect(()=>{
    const t1=setTimeout(()=>setPhase(1),400);
    const t2=setTimeout(()=>setPhase(2),1200);
    return()=>{clearTimeout(t1);clearTimeout(t2);};
  },[]);
  if(!habit)return null;
  const newStreak=habit.streak+1;
  const oldStage=stageFromStreak(habit.streak);
  const newStage=stageFromStreak(newStreak);
  const evolved=oldStage!==newStage;
  const graduated=newStage==='transformed';
  return (
    <div style={{position:'absolute',inset:0,zIndex:70,background:'linear-gradient(180deg,#DCEAF1,#F7F2E5)',display:'flex',flexDirection:'column',animation:'fadeIn 0.3s'}}>
      <style>{`@keyframes rise{0%{transform:translateY(0);}100%{transform:translateY(-80px);}}@keyframes particle{0%{transform:translateY(0) scale(1);opacity:1;}100%{transform:translateY(-200px) scale(0);opacity:0;}}`}</style>
      <div style={{position:'absolute',inset:0}}><Sky mood="day" height={520}/><div style={{position:'absolute',bottom:0,left:0,right:0}}><Sea height={140} vitality={0.9} mood="day"/></div></div>
      <div style={{position:'absolute',left:'50%',top:'32%',transform:'translateX(-50%)',animation:phase>=1?'rise 1.5s ease-out forwards':'bob 3s ease-in-out infinite',transition:'all 0.5s'}}>
        <Mochi streak={newStreak} hue={habit.hue} accessory={habit.accessory} theme={habit.theme} size={180}/>
        {phase>=1&&Array.from({length:8}).map((_,i)=><div key={i} style={{position:'absolute',left:`${50+(i-4)*12}%`,top:'40%',width:4+(i%3),height:4+(i%3),borderRadius:'50%',background:['#F8F4E6','#FFFBE8',habit.hue][i%3],opacity:0.8,animation:`particle ${1.5+(i%3)*0.3}s ease-out forwards ${i*0.08}s`}}/>)}
      </div>
      <div style={{position:'absolute',left:22,right:22,bottom:120,textAlign:'center',opacity:phase>=2?1:0,transition:'opacity 0.6s'}}>
        <div style={{fontFamily:'var(--font-ui)',fontSize:11,fontWeight:700,color:graduated?'var(--ochre-400)':'var(--ink-3)',letterSpacing:1.6,textTransform:'uppercase'}}>{graduated?'✦ Transformed':'A new stage'}{!evolved&&!graduated&&'Day kept'}</div>
        <H1 style={{marginTop:8,fontSize:graduated?30:34}}>{graduated?`${habit.creatureName} has become.`:evolved?`${habit.creatureName} is awakening.`:`Day ${newStreak} for ${habit.creatureName}.`}</H1>
        <div style={{marginTop:14,fontFamily:'var(--font-display)',fontStyle:'italic',fontSize:17,color:'var(--ink-2)',fontWeight:300,lineHeight:1.4,maxWidth:280,margin:'14px auto 0'}}>
          {graduated?'90 days. A small act became part of who you are. This is what transformation feels like.':evolved?'A small soul is becoming. Keep tending the shore.':'The kettle clicks. The page fills. The sea rises by an inch.'}
        </div>
      </div>
      <button onClick={onClose} style={{position:'absolute',bottom:50,left:16,right:16,height:56,borderRadius:999,border:0,background:'var(--ink)',color:'var(--cream-50)',fontFamily:'var(--font-ui)',fontSize:16,fontWeight:500,cursor:'pointer',boxShadow:'0 8px 24px rgba(46,58,58,0.2)',opacity:phase>=2?1:0,transition:'opacity 0.4s'}}>Carry on</button>
    </div>
  );
}

function TweakSection({ label, children }) {

  return <div className="twk-row"><div className="twk-lbl"><span>{label}</span>{value!=null&&<span className="twk-val">{value}</span>}</div>{children}</div>;
}
function TweakRadio({ label, value, options, onChange }) {
  const opts=options.map(o=>typeof o==='object'?o:{value:o,label:o});
  const idx=Math.max(0,opts.findIndex(o=>o.value===value));
  const n=opts.length;
  return (
    <TweakRow label={label}>
      <div style={{position:'relative',display:'flex',padding:2,borderRadius:8,background:'rgba(0,0,0,.06)',userSelect:'none'}}>

        {opts.map(o=><button key={o.value} type="button" onClick={()=>onChange(o.value)} style={{flex:1,border:0,background:'transparent',color:'inherit',font:'inherit',fontWeight:500,minHeight:22,borderRadius:6,cursor:'default',padding:'4px 6px',lineHeight:1.2,position:'relative',zIndex:1}}>{o.label}</button>)}
      </div>
    </TweakRow>
  );
}
function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value?'1':'0'} onClick={()=>onChange(!value)}><i/></button>

  );
}
function TweakButton({ label, onClick }) {
  return <button type="button" className="twk-btn" onClick={onClick}>{label}</button>;
}

  if (step === 2) return (
    <div style={{position:'absolute',inset:0,background:'var(--bg)',display:'flex',flexDirection:'column',animation:'slideUp 0.35s ease-out'}}>
      <div style={{padding:'64px 24px 16px'}}>
        <div style={{fontFamily:'var(--font-display)',fontSize:28,fontWeight:400,color:'var(--ink)',letterSpacing:-0.5,marginBottom:6}}>What draws you here?</div>
        <div style={{fontFamily:'var(--font-display)',fontStyle:'italic',fontSize:15,color:'var(--ink-3)',fontWeight:300,lineHeight:1.5}}>Pick any that feel true — this helps Mochi tend to you.</div>
      </div>
      <div className="scroll-hide" style={{flex:1,overflow:'auto',padding:'4px 24px 120px'}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          {GOAL_OPTIONS.map(g=>{
            const sel = goals.includes(g.id);
            return (
              <div key={g.id} onClick={()=>toggleGoal(g.id)} style={{borderRadius:18,background:'var(--card)',border:`1.5px solid ${sel?'var(--accent)':'var(--line-strong)'}`,padding:'14px 12px',cursor:'pointer',transition:'border-color 0.2s',boxShadow:'var(--shadow-soft)',position:'relative'}}>
                {sel && <div style={{position:'absolute',top:8,right:8,width:16,height:16,borderRadius:999,background:'var(--accent)',display:'flex',alignItems:'center',justifyContent:'center'}}><svg width="8" height="8" viewBox="0 0 10 10" fill="none" stroke="white" strokeWidth="2.2" strokeLinecap="round"><path d="M2 5l2.5 2.5 4-4"/></svg></div>}
                <div style={{fontSize:22,marginBottom:6}}>{g.icon}</div>
                <div style={{fontFamily:'var(--font-display)',fontSize:14,fontWeight:500,color:'var(--ink)',marginBottom:2}}>{g.label}</div>
                <div style={{fontSize:11,color:'var(--ink-4)',lineHeight:1.3}}>{g.desc}</div>
              </div>
            );
          })}
        </div>
      </div>
      <div style={{position:'absolute',bottom:0,left:0,right:0,padding:'12px 24px 40px',background:'linear-gradient(180deg,transparent,var(--bg) 30%)'}}>
        <button onClick={()=>setStep(3)} style={{width:'100%',height:56,borderRadius:999,border:0,background:'var(--ink)',color:'var(--cream-50)',fontFamily:'var(--font-ui)',fontSize:16,fontWeight:500,cursor:'pointer',boxShadow:'0 8px 24px rgba(46,58,58,0.18)'}}>
          {goals.length > 0 ? `Continue with ${goals.length} goal${goals.length>1?'s':''}` : 'Continue →'}
        </button>
      </div>
    </div>
  );

  // ── Step 3 — Start choice ────────────────────────────────────
  return (
    <div style={{position:'absolute',inset:0,background:'var(--bg)',display:'flex',flexDirection:'column',padding:'72px 24px 48px',animation:'slideUp 0.35s ease-out'}}>
      <div style={{fontFamily:'var(--font-display)',fontSize:28,fontWeight:400,color:'var(--ink)',letterSpacing:-0.5,marginBottom:4}}>
        Welcome, {name}<span style={{fontSize:18,color:'var(--ink-4)',marginLeft:4}}>{getNameKanji(name)}</span>.
      </div>
      <div style={{fontFamily:'var(--font-display)',fontStyle:'italic',fontSize:16,color:'var(--ink-3)',fontWeight:300,marginBottom:32,lineHeight:1.5}}>Would you like to explore with example habits, or begin fresh?</div>
      <div onClick={()=>handleStart(false)} style={{borderRadius:'var(--radius-card)',background:'var(--card)',border:'1.5px solid var(--accent)',boxShadow:'var(--shadow-card)',padding:20,marginBottom:12,cursor:'pointer',display:'flex',gap:14,alignItems:'center'}}>
        <div style={{display:'flex',gap:4}}>{[HABIT_HUES.sage,HABIT_HUES.sky,HABIT_HUES.rose].map(hue=><Mochi key={hue} fixedStage="toddler" hue={hue} size={42}/>)}</div>
        <div>
          <div style={{fontFamily:'var(--font-display)',fontSize:17,fontWeight:500,color:'var(--ink)',marginBottom:3}}>Try the demo</div>
          <div style={{fontSize:12,color:'var(--ink-3)',lineHeight:1.4}}>Five example habits and mochi to explore the app.</div>
        </div>
      </div>
      <div onClick={()=>handleStart(true)} style={{borderRadius:'var(--radius-card)',background:'var(--card)',border:'0.5px solid var(--line-strong)',boxShadow:'var(--shadow-soft)',padding:20,cursor:'pointer',display:'flex',gap:14,alignItems:'center'}}>
        <div style={{width:42,height:42,display:'flex',alignItems:'center',justifyContent:'center'}}><Mochi fixedStage="seed" hue={HABIT_HUES.ochre} size={42}/></div>
        <div>
          <div style={{fontFamily:'var(--font-display)',fontSize:17,fontWeight:500,color:'var(--ink)',marginBottom:3}}>Start fresh</div>
          <div style={{fontSize:12,color:'var(--ink-3)',lineHeight:1.4}}>Plant your first habit and watch it grow.</div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════════════════════
function App() {
  const [tweaks, setTweak] = useTweaks({ palette:'watercolor', mood:'day', animations:true });

  // ── Persistent state ──────────────────────────────────────────
  const [onboarded, setOnboarded] = React.useState(()=>!!localStorage.getItem('mochi_onboarded'));
  const [userName, setUserName] = React.useState(()=>localStorage.getItem('mochi_name')||'');
  const [habits, setHabits] = React.useState(()=>{
    try {
      const s = localStorage.getItem('mochi_habits');
      if (!s) return INITIAL_HABITS;
      // Migrate: add frequency and theme to any habit missing them
      return JSON.parse(s).map(h => {
        const h2 = h.frequency ? h : {...h, frequency:'daily'};
        return h2.theme ? h2 : {...h2, theme: inferTheme(h2).theme};
      });
    } catch { return INITIAL_HABITS; }
  });
  React.useEffect(()=>{ try{localStorage.setItem('mochi_habits',JSON.stringify(habits));}catch{} },[habits]);

  const [route, setRoute] = React.useState({ tab:'today' });
  const [overlay, setOverlay] = React.useState(null);

  React.useEffect(()=>{
    document.documentElement.dataset.palette = tweaks.palette==='twilight'?'twilight':tweaks.palette==='dawn'?'dawn':'';
  },[tweaks.palette]);

  // Derive greeting from time
  const greeting = (() => {
    if (tweaks.mood === 'dawn') return 'Soft dawn';
    if (tweaks.mood === 'dusk') return 'Soft dusk';
    if (tweaks.mood === 'night') return 'Quiet night';
    const h = new Date().getHours();
    if (h < 12) return 'Good morning';
    if (h < 17) return 'Good afternoon';
    return 'Good evening';
  })();

  const openHabit=(id)=>setOverlay({type:'detail',habitId:id});
  const closeOverlay=()=>setOverlay(null);

  const complete=(id)=>{
    const h=habits.find(x=>x.id===id);
    if(!h||h.done)return;
    setOverlay({type:'checkin',habitId:id});
    setHabits(habits.map(x=>x.id===id?{...x,done:true,streak:x.streak+1,longest:Math.max(x.longest,x.streak+1),withered:false,history:[...x.history.slice(1),true]}:x));
  };
  const addHabit=(h)=>{setHabits([...habits,h]);closeOverlay();};
  const retire=(id)=>{setHabits(habits.filter(x=>x.id!==id));closeOverlay();};
  const remove=(id)=>{setHabits(habits.filter(x=>x.id!==id));closeOverlay();};

  const detailHabit=overlay&&overlay.type==='detail'?habits.find(h=>h.id===overlay.habitId):null;
  const checkinHabit=overlay&&overlay.type==='checkin'?habits.find(h=>h.id===overlay.habitId):null;

  // Tweaks panel open state
  const [tweaksOpen, setTweaksOpen] = React.useState(false);

  // ── Onboarding gate ──────────────────────────────────────────
  if (!onboarded) return (
    <OnboardingScreen onComplete={(n, fresh, goals)=>{
      const nm = n||'';
      setUserName(nm);
      try {
        localStorage.setItem('mochi_name', nm);
        localStorage.setItem('mochi_onboarded','1');
        if (goals && goals.length) localStorage.setItem('mochi_goals', JSON.stringify(goals));
      } catch{}
      if (fresh) setHabits([]);
      else setHabits(INITIAL_HABITS); // "Try the demo" always loads fresh examples
      setOnboarded(true);
    }}/>
  );

  return (
    <div className={tweaks.animations?'':'no-anim'} style={{position:'absolute',inset:0,overflow:'hidden',background:'var(--bg)'}}>
      {route.tab==='today'&&!overlay&&<TodayScreen habits={habits} onOpenHabit={openHabit} onComplete={complete} onAdd={()=>setOverlay({type:'add'})} mood={tweaks.mood} greeting={greeting} userName={userName}/>}
      {route.tab==='garden'&&!overlay&&<GardenScreen habits={habits} onOpenHabit={openHabit} mood={tweaks.mood}/>}
      {route.tab==='insights'&&!overlay&&<InsightsScreen habits={habits} userName={userName}/>}
      {route.tab==='coach'&&!overlay&&<CoachScreen habits={habits} mood={tweaks.mood}/>}

      {(route.tab==='today'||route.tab==='garden')&&!overlay&&(
        <button onClick={()=>setOverlay({type:'add'})} title={habits.length>=5?'5 habit limit reached':''} style={{position:'absolute',right:18,bottom:96,zIndex:25,width:54,height:54,borderRadius:999,border:0,background:habits.length>=5?'var(--ink-4)':'var(--ink)',color:'var(--cream-50)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',boxShadow:'0 8px 24px rgba(46,58,58,0.28)',opacity:habits.length>=5?0.5:1}}>{ICON.plus()}</button>
      )}

      {!overlay&&<BottomTabBar active={route.tab} onChange={tab=>setRoute({tab})}/>}

      {/* Tweaks button */}
      {!overlay&&(
        <button onClick={()=>setTweaksOpen(!tweaksOpen)} style={{position:'absolute',top:54,right:14,zIndex:40,width:44,height:44,borderRadius:999,border:0,background:'rgba(255,255,255,0.75)',backdropFilter:'blur(10px)',boxShadow:'0 1px 3px rgba(46,58,58,0.12)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--ink-3)'}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><circle cx="12" cy="12" r="2.5"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      )}

      {/* Tweaks panel */}
      {tweaksOpen&&!overlay&&(
        <div style={{position:'absolute',top:100,right:12,zIndex:200,width:240,background:'rgba(250,249,247,0.92)',backdropFilter:'blur(20px)',borderRadius:14,border:'0.5px solid rgba(255,255,255,0.6)',boxShadow:'0 12px 40px rgba(0,0,0,0.18)',padding:'12px 14px 14px',fontFamily:'var(--font-ui)',fontSize:12}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <span style={{fontWeight:600,fontSize:12,letterSpacing:0.1,color:'#29261b'}}>Tweaks</span>
            <button onClick={()=>setTweaksOpen(false)} style={{appearance:'none',border:0,background:'transparent',color:'rgba(41,38,27,0.55)',width:22,height:22,borderRadius:6,cursor:'default',fontSize:13,lineHeight:1}}>✕</button>
          </div>
          <TweakSection label="Mood">
            <TweakRadio label="Sky" value={tweaks.mood} onChange={v=>setTweak('mood',v)} options={[{value:'dawn',label:'Dawn'},{value:'day',label:'Day'},{value:'dusk',label:'Dusk'},{value:'night',label:'Night'}]}/>
            <TweakRadio label="Palette" value={tweaks.palette} onChange={v=>setTweak('palette',v)} options={[{value:'watercolor',label:'Sea'},{value:'twilight',label:'Twilight'},{value:'dawn',label:'Forest'}]}/>
          </TweakSection>
          <TweakSection label="Motion">
            <TweakToggle label="Animations" value={tweaks.animations} onChange={v=>setTweak('animations',v)}/>
          </TweakSection>
          <TweakSection label="Actions">
            <TweakButton label="Plant a habit" onClick={()=>{setTweaksOpen(false);setOverlay({type:'add'});}}/>
            <div style={{height:4}}/>
            <TweakButton label="Reset habits" onClick={()=>{setHabits(INITIAL_HABITS);try{localStorage.setItem('mochi_habits',JSON.stringify(INITIAL_HABITS));}catch{} setOverlay(null);setTweaksOpen(false);}}/>
            <div style={{height:4}}/>
            <TweakButton label="Reset onboarding" onClick={()=>{try{localStorage.removeItem('mochi_onboarded');localStorage.removeItem('mochi_name');}catch{} setOnboarded(false);setUserName('');setTweaksOpen(false);}}/>
          </TweakSection>
        </div>
      )}

      {/* Overlays */}
      {overlay&&overlay.type==='detail'&&detailHabit&&(
        <div style={{position:'absolute',inset:0,zIndex:50,background:'var(--bg)',animation:'slideLeft 0.3s ease-out'}}>
          <DetailScreen habit={detailHabit} onBack={closeOverlay} onComplete={()=>{closeOverlay();complete(detailHabit.id);}} onRetire={()=>retire(detailHabit.id)} onDelete={()=>remove(detailHabit.id)} mood={tweaks.mood}/>
        </div>
      )}
      {overlay&&overlay.type==='add'&&<AddHabitScreen onClose={closeOverlay} onCreate={addHabit} habitCount={habits.length}/>}
      {overlay&&overlay.type==='checkin'&&checkinHabit&&<CheckInOverlay habit={{...checkinHabit,streak:checkinHabit.streak-1}} onClose={closeOverlay}/>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// MOUNT
// ═══════════════════════════════════════════════════════════════
function Mount() {
  // On a real iOS/Android device, fill the screen natively; desktop shows the iPhone frame
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  if (isMobile) {
    return (
      <div style={{width:'100vw',height:'100dvh',position:'relative',overflow:'hidden',background:'var(--bg)',WebkitFontSmoothing:'antialiased'}}>
        <App/>
      </div>
    );
  }
  return (
    <IOSDevice width={402} height={874}>
      <App/>
    </IOSDevice>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Mount/>);
</script>
</body>
</html>
